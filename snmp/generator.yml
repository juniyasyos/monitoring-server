####################################################################################################
# SNMP Generator Configuration for MikroTik RouterOS
#
# Defines which OIDs to walk for the 'mikrotik' module.
# Run generate.sh to produce snmp.yml, then mount into snmp-exporter container.
#
# OID References:
#   - MikroTik private MIB:     1.3.6.1.4.1.14988.1.1.1.x
#   - Standard IF-MIB:          1.3.6.1.2.1.2.x
#   - IF-MIB High Capacity:     1.3.6.1.2.1.31.1.1.x
#   - Host Resources MIB:       1.3.6.1.2.1.25.x
####################################################################################################

modules:
  mikrotik:
    walk:
      # ── System ──────────────────────────────────────────────────────────────────────────────────
      - 1.3.6.1.2.1.1           # system: sysDescr, sysUpTime, sysName, sysLocation, etc.
      - 1.3.6.1.2.1.25.1       # hrSystem: system uptime, users, processes

      # ── Interfaces ──────────────────────────────────────────────────────────────────────────────
      - 1.3.6.1.2.1.2.2        # ifTable: all interface entries
      - 1.3.6.1.2.1.31.1.1    # ifXTable: ifName, ifHCInOctets, ifHCOutOctets, ifAlias, ifHighSpeed

      # ── MikroTik: Memory & Storage ──────────────────────────────────────────────────────────────
      #   .2  totalMemory   .3  freeMemory
      #   .4  totalStorage  .5  usedStorage  .6  freeStorage
      #   .7  architecture  .8  boardName    .10 version
      - 1.3.6.1.4.1.14988.1.1.1.1

      # ── MikroTik: CPU Load ──────────────────────────────────────────────────────────────────────
      #   .1  cpuLoad (0-100)
      - 1.3.6.1.4.1.14988.1.1.1.2

      # ── MikroTik: Temperature ────────────────────────────────────────────────────────────────────
      #   .1  cpuTemperature  .2  boardTemperature
      - 1.3.6.1.4.1.14988.1.1.1.3

      # ── MikroTik: Health (voltage, current, fan, power) ──────────────────────────────────────────
      - 1.3.6.1.4.1.14988.1.1.1.4

      # ── MikroTik: Wireless ───────────────────────────────────────────────────────────────────────
      - 1.3.6.1.4.1.14988.1.1.1.5

      # ── MikroTik: PoE ────────────────────────────────────────────────────────────────────────────
      - 1.3.6.1.4.1.14988.1.1.1.6

      # ── MikroTik: UPS ────────────────────────────────────────────────────────────────────────────
      - 1.3.6.1.4.1.14988.1.1.1.7

    lookups:
      - old_index: ifIndex
        new_index: ifAlias
        labels:
          - ifAlias
      - old_index: ifIndex
        new_index: ifName
        labels:
          - ifName
      - old_index: ifIndex
        new_index: ifDescr
        labels:
          - ifDescr

    overrides:
      ifIndex:
        ignore: true
      ifInOctets:
        ignore: true                   # prefer ifHCInOctets (64-bit)
      ifOutOctets:
        ignore: true                   # prefer ifHCOutOctets (64-bit)
      ifDescr:
        type: DisplayString
      ifAlias:
        type: DisplayString
      ifName:
        type: DisplayString
      ifPhysAddress:
        type: PhysAddress

    auth:
      community: public_v2
