####################################################################################################
# Docker Compose - SNMP Exporter for Mikrotik Monitoring
#
# Purpose: Run Prometheus SNMP Exporter so Prometheus can scrape Mikrotik devices over SNMP.
# Deploy this on the same Docker host/network as the monitoring stack.
#
# Usage:
#   docker compose -f docker-compose-snmp-exporter.yml up -d
#
# Exposed ports:
#   9116 - SNMP Exporter metrics endpoint and /snmp proxy
#
# Notes:
#   - snmp.yml is generated from snmp/generator.yml (run ./snmp/generate.sh)
#   - Default auth is public_v2; change it in generator.yml if needed.
####################################################################################################

name: snmp-exporter-stack

services:
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    ports:
      - "9116:9116"
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - "--web.listen-address=:9116"
      - "--config.file=/etc/snmp_exporter/snmp.yml"
    restart: unless-stopped
    networks:
      - monitoring-network

####################################################################################################
# Networks
####################################################################################################
networks:
  monitoring-network:
    external: true
    name: monitoring-network